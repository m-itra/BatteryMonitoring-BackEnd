
services:
  # База данных пользователей
  user-db:
    image: postgres:15
    container_name: user-db
    environment:
      POSTGRES_DB: userdb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    expose:
      - "5432"
    volumes:
      - user-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d userdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - battery-network

  # База данных батареи
  battery-db:
    image: postgres:15
    container_name: battery-db
    environment:
      POSTGRES_DB: batterydb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    expose:
      - "5432"
    volumes:
      - battery-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d batterydb"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - battery-network

  user-db-migrations:
    image: python:3.11-slim
    container_name: user-db-migrations
    working_dir: /workspace/Infrastructure
    volumes:
      - ..:/workspace
    environment:
      USER_DATABASE_URL: postgresql://admin:password@user-db:5432/userdb
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
             alembic -c migrations/user-db/alembic.ini upgrade head"
    depends_on:
      user-db:
        condition: service_healthy
    networks:
      - battery-network

  battery-db-migrations:
    image: python:3.11-slim
    container_name: battery-db-migrations
    working_dir: /workspace/Infrastructure
    volumes:
      - ..:/workspace
    environment:
      BATTERY_DATABASE_URL: postgresql://admin:password@battery-db:5432/batterydb
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
             alembic -c migrations/battery-db/alembic.ini upgrade head"
    depends_on:
      battery-db:
        condition: service_healthy
    networks:
      - battery-network


  # UserService
  user-service:
    build: ../UserService
    container_name: user-service
    expose:
      - "8001"
      - "50051"
    environment:
      ENVIRONMENT: docker
      DATABASE_URL: postgresql://admin:password@user-db:5432/userdb
      JWT_SECRET: my-secret-key-change-in-production
      JWT_ALGORITHM: HS256
      JWT_EXPIRATION_HOURS: 720
      USER_SERVICE_GRPC_URL: user-service:50051
      PROCESSING_SERVICE_GRPC_URL: processing-service:50052
    depends_on:
      user-db-migrations:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - battery-network
  
  # ProcessingService
  processing-service:
    build: ../ProcessingService
    container_name: processing-service
    expose:
      - "8002"
      - "50052"
    environment:
      ENVIRONMENT: docker
      DATABASE_URL: postgresql://admin:password@battery-db:5432/batterydb
      MIN_SESSION_DISCHARGE_PERCENT: 1
      USER_SERVICE_GRPC_URL: user-service:50051
      PROCESSING_SERVICE_GRPC_URL: processing-service:50052
    depends_on:
      battery-db-migrations:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - battery-network

    # AnalyticsService
  analytics-service:
    build: ../AnalyticsService
    container_name: analytics-service
    expose:
      - "8003"
    environment:
      ENVIRONMENT: docker
      DATABASE_URL: postgresql://admin:password@battery-db:5432/batterydb
      JWT_SECRET: my-secret-key-change-in-production
      JWT_ALGORITHM: HS256
      USER_SERVICE_URL: http://user-service:8001
      USER_SERVICE_GRPC_URL: user-service:50051
    depends_on:
      battery-db-migrations:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - battery-network

  # API Gateway
  gateway:
    build: ../Gateway
    container_name: gateway
    expose:
      - "8000"
    environment:
      ENVIRONMENT: docker
      JWT_SECRET: my-secret-key-change-in-production
      JWT_ALGORITHM: HS256
      AUTH_COOKIE_MAX_AGE_SECONDS: 2592000
      USER_SERVICE_URL: http://user-service:8001
      PROCESSING_SERVICE_URL: http://processing-service:8002
      ANALYTICS_SERVICE_URL: http://analytics-service:8003
    depends_on:
      - user-service
      - processing-service
      - analytics-service
    restart: unless-stopped
    networks:
      - battery-network

  frontend:
    build: ../../BatteryMonitoring-FrontEnd
    container_name: frontend
    ports:
      - "3000:80"
    depends_on:
      - gateway
    restart: unless-stopped
    networks:
      - battery-network

volumes:
  user-db-data:
  battery-db-data:

networks:
  battery-network:
    driver: bridge

services:
  # User database
  user-db:
    image: postgres:15
    container_name: user-db
    environment:
      POSTGRES_DB: ${DOCKER_USER_DB_NAME}
      POSTGRES_USER: ${DOCKER_USER_DB_USER}
      POSTGRES_PASSWORD: ${DOCKER_USER_DB_PASSWORD}
    expose:
      - "5432"
    volumes:
      - user-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DOCKER_USER_DB_USER} -d ${DOCKER_USER_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - battery-network

  # Battery database
  battery-db:
    image: postgres:15
    container_name: battery-db
    environment:
      POSTGRES_DB: ${DOCKER_BATTERY_DB_NAME}
      POSTGRES_USER: ${DOCKER_BATTERY_DB_USER}
      POSTGRES_PASSWORD: ${DOCKER_BATTERY_DB_PASSWORD}
    expose:
      - "5432"
    volumes:
      - battery-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DOCKER_BATTERY_DB_USER} -d ${DOCKER_BATTERY_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - battery-network

  user-db-migrations:
    image: python:3.11-slim
    container_name: user-db-migrations
    working_dir: /workspace/Infrastructure
    volumes:
      - ..:/workspace
    environment:
      USER_DATABASE_URL: ${DOCKER_USER_DATABASE_URL}
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
             alembic -c migrations/user-db/alembic.ini upgrade head"
    depends_on:
      user-db:
        condition: service_healthy
    networks:
      - battery-network

  battery-db-migrations:
    image: python:3.11-slim
    container_name: battery-db-migrations
    working_dir: /workspace/Infrastructure
    volumes:
      - ..:/workspace
    environment:
      BATTERY_DATABASE_URL: ${DOCKER_BATTERY_DATABASE_URL}
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
             alembic -c migrations/battery-db/alembic.ini upgrade head"
    depends_on:
      battery-db:
        condition: service_healthy
    networks:
      - battery-network

  # UserService
  user-service:
    build: ../UserService
    container_name: user-service
    expose:
      - "8001"
      - "50051"
    environment:
      ENVIRONMENT: ${DOCKER_ENVIRONMENT}
      DATABASE_URL: ${DOCKER_USER_DATABASE_URL}
      JWT_SECRET: ${DOCKER_JWT_SECRET}
      JWT_ALGORITHM: ${DOCKER_JWT_ALGORITHM}
      JWT_EXPIRATION_HOURS: ${DOCKER_JWT_EXPIRATION_HOURS}
      USER_SERVICE_GRPC_URL: ${DOCKER_USER_SERVICE_GRPC_URL}
      PROCESSING_SERVICE_GRPC_URL: ${DOCKER_PROCESSING_SERVICE_GRPC_URL}
    depends_on:
      user-db-migrations:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - battery-network

  # ProcessingService
  processing-service:
    build: ../ProcessingService
    container_name: processing-service
    expose:
      - "8002"
      - "50052"
    environment:
      ENVIRONMENT: ${DOCKER_ENVIRONMENT}
      DATABASE_URL: ${DOCKER_BATTERY_DATABASE_URL}
      MIN_SESSION_DISCHARGE_PERCENT: ${DOCKER_MIN_SESSION_DISCHARGE_PERCENT}
      USER_SERVICE_GRPC_URL: ${DOCKER_USER_SERVICE_GRPC_URL}
      PROCESSING_SERVICE_GRPC_URL: ${DOCKER_PROCESSING_SERVICE_GRPC_URL}
    depends_on:
      battery-db-migrations:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - battery-network

  # AnalyticsService
  analytics-service:
    build: ../AnalyticsService
    container_name: analytics-service
    expose:
      - "8003"
    environment:
      ENVIRONMENT: ${DOCKER_ENVIRONMENT}
      DATABASE_URL: ${DOCKER_BATTERY_DATABASE_URL}
      JWT_SECRET: ${DOCKER_JWT_SECRET}
      JWT_ALGORITHM: ${DOCKER_JWT_ALGORITHM}
    depends_on:
      battery-db-migrations:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - battery-network

  # API Gateway
  gateway:
    build: ../Gateway
    container_name: gateway
    expose:
      - "8000"
    environment:
      ENVIRONMENT: ${DOCKER_ENVIRONMENT}
      JWT_SECRET: ${DOCKER_JWT_SECRET}
      JWT_ALGORITHM: ${DOCKER_JWT_ALGORITHM}
      AUTH_COOKIE_MAX_AGE_SECONDS: ${DOCKER_AUTH_COOKIE_MAX_AGE_SECONDS}
      USER_SERVICE_URL: ${DOCKER_USER_SERVICE_URL}
      PROCESSING_SERVICE_URL: ${DOCKER_PROCESSING_SERVICE_URL}
      ANALYTICS_SERVICE_URL: ${DOCKER_ANALYTICS_SERVICE_URL}
    depends_on:
      - user-service
      - processing-service
      - analytics-service
    restart: unless-stopped
    networks:
      - battery-network

  frontend:
    build: ../../BatteryMonitoring-FrontEnd
    container_name: frontend
    ports:
      - "3000:80"
    depends_on:
      - gateway
    restart: unless-stopped
    networks:
      - battery-network

volumes:
  user-db-data:
  battery-db-data:

networks:
  battery-network:
    driver: bridge
